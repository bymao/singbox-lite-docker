services:
  singbox:
    build: .
    # 若已有预构建镜像，可替换 build 为：
    # image: singbox-lite:latest
    container_name: singbox-lite
    restart: unless-stopped
    privileged: true          # iptables / tun 等高权限操作所需
    network_mode: bridge

    # ────────────────────────────────────────────────
    # 端口映射（bridge 模式下必须配置，请根据实际节点端口取消注释并修改）
    # ────────────────────────────────────────────────
    # ports:
    #   - "443:443/tcp"       # VLESS-Reality / TLS 节点
    #   - "443:443/udp"       # Hysteria2 / TUIC 节点（QUIC）
    #   - "8443:8443/tcp"
    #   - "8443:8443/udp"
    #   - "2096:2096/tcp"
    #   - "2096:2096/udp"
    #   - "10000:10000/tcp"   # 自定义端口，按需添加

    volumes:
      # sing-box 配置目录（持久化，迁移时只需复制 ./config 文件夹）
      - ./config/sing-box:/usr/local/etc/sing-box

    environment:
      - TZ=Asia/Shanghai      # 时区，按需修改

    # 容器内存不足时的 OOM 保护（可选）
    # mem_limit: 256m
